<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home – Google-like Account Menu (Static)</title>
  <style>
    :root{ --blue:#1a73e8; --text:#202124; --bg:#fff; --shadow:0 2px 6px rgba(0,0,0,.12); }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto; background:#f5f7fa; color:var(--text); }
    .topbar{ height:64px; background:#fff; display:flex; align-items:center; justify-content:space-between; padding:0 20px; box-shadow: 0 1px 0 rgba(0,0,0,.06); }
    .brand{ font-weight:600; font-size:20px; }
    .account{ position:relative; }
    .avatar{ width:40px; height:40px; border-radius:50%; background:var(--blue); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; cursor:pointer; border:2px solid #fff; box-shadow:0 1px 3px rgba(0,0,0,.2); }
    .dropdown{ position:absolute; right:0; top:52px; background:#fff; border:1px solid #e6e6e6; border-radius:8px; min-width:260px; box-shadow:0 8px 24px rgba(0,0,0,.12); padding:0; display:none; z-index:1000; overflow:hidden; }
    .dropdown.open{ display:block; }
    .dropdown .user{ padding:12px 16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #f0f0f0; }
    .dropdown .thumb{ width:40px; height:40px; border-radius:50%; background:#f0f0f0; display:flex; align-items:center; justify-content:center; font-weight:600; }
    .dropdown .name{ font-weight:600; }
    .dropdown .email{ font-size:12px; color:#666; }
    .dropdown .item{ padding:12px 16px; display:flex; align-items:center; gap:12px; cursor:pointer; }
    .dropdown .item:hover{ background:#f5f7fa; }
  </style>
  </head>
  <body>
  <header class="topbar" aria-label="Top navigation">
    <div class="brand">JPhotos</div>
    <div class="account" aria-label="Account menu">
      <button id="accountBtn" class="avatar" aria-expanded="false" aria-haspopup="true" aria-controls="accountMenu" title="Account">
        JD
      </button>
      <div id="accountMenu" class="dropdown" role="menu" aria-label="Account menu">
        <div class="user" role="none">
          <div class="thumb" aria-label="avatar">JD</div>
          <div>
            <div class="name">John Doe</div>
            <div class="email">john.doe@example.com</div>
          </div>
        </div>
        <div class="item" role="menuitem" tabindex="0" data-action="manage">
          <span>Manage your Google Account</span>
        </div>
        <div class="item" role="menuitem" tabindex="0" data-action="signout">
          <span>Sign out</span>
        </div>
      </div>
    </div>
  </header>

  <main style="padding:32px;">
    <h1 style="font-size:28px;margin:0 0 12px;">Welcome to JPhotos</h1>
    <p>Use the account menu in the header to switch accounts or sign out.</p>
  </main>

  <script>
    (function(){
      const btn = document.getElementById('accountBtn');
      const menu = document.getElementById('accountMenu');
      function open(){ menu.classList.add('open'); btn.setAttribute('aria-expanded','true'); }
      function close(){ menu.classList.remove('open'); btn.setAttribute('aria-expanded','false'); }
      btn.addEventListener('click', (e)=>{ e.stopPropagation(); menu.classList.contains('open') ? close() : open(); });
      document.addEventListener('click', (e)=>{ if(!menu.contains(e.target) && e.target !== btn){ close(); } });
      document.addEventListener('keydown', (e)=>{ if(menu.classList.contains('open') && e.key === 'Escape'){ close(); btn.focus(); } });
      menu.querySelectorAll('[role="menuitem"]').forEach(item=>{
        item.addEventListener('click', ()=>{ alert('Action: ' + item.dataset.action); close(); });
      });
    })();
  </script>
</body>
</html>
