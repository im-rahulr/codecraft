<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join CodeCraft - Hackathon Team</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./sections/work-section.css" />
    <link rel="stylesheet" href="./sections/about-section.css" />
    <link rel="stylesheet" href="./sections/niches-section.css" />
    <link rel="stylesheet" href="./join-team.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="top-nav">
        <a href="./index.html" class="brand">CodeCraft</a>
        <nav class="nav-links" aria-label="Primary">
          <a href="./index.html">Home</a>
          <a href="./index.html#about-section-root">About</a>
          <a href="./projects.html">Projects</a>
          <a href="./blog.html">Blog</a>
        </nav>
        <a href="mailto:cto@netc.fr" class="nav-cta">↳ Get in touch</a>
        <button class="mobile-menu" type="button" aria-label="Open menu">
          Menu
        </button>
      </header>

      <main class="join-page">
        <section class="join-section">
          <div class="join-section__content">
            <h2>Join Our Team</h2>
            <p>Ready to build amazing things with us? Fill out the form.</p>
            <form id="join-form" action="https://api.web3forms.com/submit" method="POST">
              <input type="hidden" name="access_key" value="cae30f52-a8c3-4e54-9060-b0b43a4219d6">
              <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
              </div>
              <div class="form-group">
                <label for="college">College</label>
                <input type="text" id="college" name="college" required>
              </div>
              <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" list="cities" required>
                <datalist id="cities">
                  <option value="Bangalore">
            
                  <option value="Hyderabad">
                 
                </datalist>
              </div>
              <div class="form-group">
                <label for="mobile">Mobile Number</label>
                <input type="tel" id="mobile" name="mobile" required>
              </div>
              <div class="form-group">
                <label for="email">Email ID</label>
                <input type="email" id="email" name="email" required>
              </div>
              <div class="form-group">
                <label for="role">Role to Apply For</label>
                <select id="role" name="role" required>
                  <option value="">Select Role</option>
                  <option value="Technical Project Manager">Technical Project Manager</option>
                  <option value="Head of Research">Head of Research</option>
                  <option value="Frontend Developer">Frontend Developer</option>
                  <option value="Backend Developer">Backend Developer</option>
                </select>
              </div>
              <div class="form-group">
                <label for="reason">Why did you choose CodeCraft?</label>
                <textarea id="reason" name="reason" required></textarea>
              </div>
              <div class="form-group checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I accept the terms and conditions</label>
              </div>
              <button type="submit">Submit</button>
            </form>
            <div id="success-message" style="display:none;"></div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="footer-top">
          <section class="footer-brand-block">
            <h2 class="footer-logo">CodeCraft</h2>
            <p>Pretty good hackathon team.</p>
            <a href="#" class="footer-call">◌ Collaborate with us</a>
          </section>

          <section class="footer-links-group">
            <h3>Navigation</h3>
            <nav class="footer-nav" aria-label="Footer navigation">
              <a href="./index.html">Home</a>
              <a href="./index.html#about-section-root">About</a>
              <a href="./projects.html">Projects</a>
              <a href="./blog.html">Blog</a>
            </nav>
          </section>

          <section class="footer-links-group">
            <h3>Contacts</h3>
            <div class="footer-contact-list">
              <a href="mailto:cto@netc.fr">cto@netc.fr</a>
              <a href="mailto:cto@netc.fr?subject=Hackathon%20Collaboration"
                >Start collaborating</a
              >
              <p>Bangalore</p>
            </div>
          </section>
        </div>

        <p class="footer-wordmark" aria-hidden="true">CODECRAFT</p>
      </footer>
    </div>

    <script src="./script.js"></script>
    <script>
      document.getElementById('join-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        const name = formData.get('name');
        
        try {
          const response = await fetch('https://api.web3forms.com/submit', {
            method: 'POST',
            body: formData
          });
          
          if (response.ok) {
            const token = Math.random().toString(36).substr(2, 9).toUpperCase();
            const successDiv = document.getElementById('success-message');
            successDiv.innerHTML = `
              <div class="success-content">
                <h3>Hello ${name}!</h3>
                <p>Your form has been submitted successfully.</p>
                <p><strong>Token Number: ${token}</strong></p>
                <p>Kindly wait for us to review within 12 working hours.</p>
                <a href="./index.html" class="back-home-btn">Back to Home</a>
              </div>
            `;
            successDiv.style.display = 'block';
            this.style.display = 'none';
          }
        } catch (error) {
          console.error('Form submission error:', error);
          alert('There was an error submitting your form. Please try again.');
        }
      });
    </script>
  </body>
</html>
